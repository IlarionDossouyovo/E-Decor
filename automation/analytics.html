<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>E-Décor - Analytics</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Segoe UI;background:#0f0f1a;color:#fff;min-height:100vh}
    .header{background:#16213e;padding:20px 30px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2a2a4a}
    .header h1{font-size:22px}
    .badge{background:#e94560;padding:5px 14px;border-radius:18px;font-size:12px}
    .refresh{background:#16213e;border:1px solid #2a2a4a;padding:8px 16px;border-radius:8px;color:#fff;cursor:pointer}
    .container{padding:30px}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:30px}
    .stat{background:#1f1f3a;padding:25px;border-radius:15px;text-align:center;border:1px solid #2a2a4a}
    .stat .n{font-size:36px;font-weight:bold;color:#e94560}
    .stat .l{color:#888;margin-top:5px}
    .stat .trend{font-size:14px;margin-top:8px}
    .stat .trend.up{color:#00d9a5}
    .stat .trend.down{color:#e94560}
    .charts{display:grid;grid-template-columns:repeat(2,1fr);gap:25px}
    .chart{background:#1f1f3a;padding:25px;border-radius:15px;border:1px solid #2a2a4a}
    .chart h3{font-size:18px;margin-bottom:20px;color:#888}
    .bar-chart{height:200px;display:flex;align-items:flex-end;gap:15px;padding-top:20px}
    .bar{flex:1;background:linear-gradient(to top,#e94560,#ff6b6b);border-radius:8px 8px 0 0;position:relative}
    .bar-label{position:absolute;bottom:-25px;left:50%;transform:translateX(-50%);font-size:12px;color:#888;white-space:nowrap}
    .bar-value{position:absolute;top:-25px;left:50%;transform:translateX(-50%);font-size:14px;font-weight:bold}
    .table{width:100%;border-collapse:collapse}
    .table th,.table td{padding:12px;text-align:left;border-bottom:1px solid #2a2a4a}
    .table th{color:#888;font-size:14px}
    .table td{font-size:15px}
    .status{padding:4px 10px;border-radius:12px;font-size:12px}
    .status.active{background:#00d9a5;color:#0f0f1a}
    .status.pending{background:#ffc107;color:#0f0f1a}
  </style>
</head>
<body>
  <div class="header">
    <h1>📊 Analytics E-Décor</h1>
    <button class="refresh" onclick="refresh()">🔄 Actualiser</button>
  </div>
  <div class="container">
    <div class="stats-grid">
      <div class="stat">
        <div class="n" id="sales">€12,450</div>
        <div class="l">Ventes aujourd'hui</div>
        <div class="trend up">↑ +12%</div>
      </div>
      <div class="stat">
        <div class="n" id="orders">47</div>
        <div class="l">Commandes</div>
        <div class="trend up">↑ +8%</div>
      </div>
      <div class="stat">
        <div class="n" id="cart">€265</div>
        <div class="l">Panier moyen</div>
        <div class="trend down">↓ -3%</div>
      </div>
      <div class="stat">
        <div class="n" id="visitors">1,234</div>
        <div class="l">Visiteurs</div>
        <div class="trend up">↑ +25%</div>
      </div>
    </div>
    <div class="charts">
      <div class="chart">
        <h3>📈 Ventes par catégorie</h3>
        <div class="bar-chart" id="salesChart"></div>
      </div>
      <div class="chart">
        <h3>📋 Commandes récentes</h3>
        <table class="table">
          <thead><tr><th>Commande</th><th>Client</th><th>Montant</th><th>Status</th></tr></thead>
          <tbody id="ordersTable"></tbody>
        </table>
      </div>
    </div>
  </div>
  <script>
    const data = {
      categories: [
        {name:'Salons', value:4500},
        {name:'Bureaux', value:3200},
        {name:'Cuisines', value:2100},
        {name:'Jardins', value:1650}
      ],
      orders: [
        {id:'#1234', client:'Jean D.', amount:'€1,299', status:'active'},
        {id:'#1233', client:'Marie L.', amount:'€899', status:'active'},
        {id:'#1232', client:'Pierre K.', amount:'€449', status:'pending'},
        {id:'#1231', client:'Sophie M.', amount:'€1,499', status:'active'}
      ]
    };
    
    function render() {
      const max = Math.max(...data.categories.map(c => c.value));
      document.getElementById('salesChart').innerHTML = data.categories.map(c => 
        '<div class="bar" style="height:' + (c.value / max * 100) + '%">' +
        '<span class="bar-value">€' + c.value + '</span>' +
        '<span class="bar-label">' + c.name + '</span></div>'
      ).join('');
      
      document.getElementById('ordersTable').innerHTML = data.orders.map(o => 
        '<tr><td>' + o.id + '</td><td>' + o.client + '</td><td>' + o.amount + '</td><td><span class="status ' + o.status + '">' + (o.status === 'active' ? 'Payée' : 'En attente') + '</span></td></tr>'
      ).join('');
    }
    
    function refresh() {
      document.querySelector('.refresh').textContent = '⏳...';
      setTimeout(() => {
        document.querySelector('.refresh').textContent = '🔄 Actualiser';
        render();
      }, 1000);
    }
    
    render();
  </script>
</body>
</html>
